name: team-vie

services:
  frontend:
    image: team-vie/vie-frontend
    container_name: vie-frontend
    build: ./client
    ports:
      - 5173:5173
    networks:
      - vie-frontend
    develop:
      watch:
        - action: sync
          path: ./client/src
          target: /app/src
          initial_sync: true
        - action: rebuild
          path: ./client/package.json
    depends_on:
      - backend

  backend:
    image: team-vie/vie-backend
    container_name: vie-backend
    build: ./server
    ports:
      - 8000:8000
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: vie-db
      DB_USER: vie
      DB_PASSWORD: CompeteToAchieve
      RUNNING_IN_DOCKER: "true"
    networks:
      - vie-frontend
      - vie-backend
    develop:
      watch:
        - action: rebuild
          path: ./server
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

  database:
    image: postgres:18
    container_name: vie-db
    volumes:
      - vie-db-data:/var/lib/postgresql
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vie -d vie-db"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 90s
    environment:
      POSTGRES_USER: vie
      POSTGRES_PASSWORD: CompeteToAchieve
      POSTGRES_DB: vie-db
    networks:
      - vie-backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vie-redis
    ports:
      - 6379:6379
    networks:
      - vie-backend
    restart: unless-stopped

networks:
  vie-frontend:
  vie-backend:

volumes:
  vie-db-data: