<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Vie - 3D Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">🎮 Team Vie 3D Interactive Experience 🎮</div>
    <div id="instructions">
        Use your mouse to rotate the view | Click on letters to interact | Scroll to zoom
    </div>
    <div id="score">Score: <span id="score-value">0</span></div>
    <div class="loading" id="loading">Loading 3D Scene...</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let score = 0;
        let scene, camera, renderer, textMeshes = [], particles = [];
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let currentRotationX = 0, currentRotationY = 0;
        let raycaster, mouse, interactiveObjects = [];

        // Initialize Three.js scene
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x1e3c72, 10, 50);

            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Raycaster for mouse interaction
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xff00ff, 2, 100);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00ffff, 2, 100);
            pointLight2.position.set(-10, -10, 10);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0xffff00, 1.5, 100);
            pointLight3.position.set(0, 10, -10);
            scene.add(pointLight3);

            // Create 3D text
            createText();

            // Create particle system
            createParticles();

            // Event listeners
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('click', onMouseClick, false);
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('wheel', onMouseWheel, false);

            // Hide loading message
            document.getElementById('loading').style.display = 'none';

            // Start animation
            animate();
        }

        function createText() {
            const text = "TEAM VIE";
            const letters = text.split('');
            
            // Create each letter as a separate 3D object
            letters.forEach((letter, index) => {
                if (letter === ' ') {
                    // Add space offset
                    return;
                }

                // Create text geometry using TextGeometry (simplified approach)
                const geometry = new THREE.BoxGeometry(1.5, 2, 0.5);
                
                // Create material with gradient-like effect
                const materials = [
                    new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 100 }),
                    new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 100 }),
                    new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100 }),
                    new THREE.MeshPhongMaterial({ color: 0x00ffff, shininess: 100 }),
                    new THREE.MeshPhongMaterial({ color: 0xffff00, shininess: 100 }),
                    new THREE.MeshPhongMaterial({ color: 0xffff00, shininess: 100 })
                ];
                
                const mesh = new THREE.Mesh(geometry, materials);
                
                // Position letters in a row
                const spacing = 2;
                const offset = -(text.replace(' ', '').length * spacing) / 2;
                let actualIndex = index - (text.substring(0, index).match(/ /g) || []).length;
                mesh.position.x = offset + actualIndex * spacing;
                mesh.position.y = 0;
                mesh.position.z = 0;
                
                // Add custom properties for animation
                mesh.userData = {
                    originalY: 0,
                    speed: 0.02 + Math.random() * 0.02,
                    offset: index * 0.5,
                    hoverScale: 1,
                    targetScale: 1,
                    letter: letter
                };
                
                textMeshes.push(mesh);
                interactiveObjects.push(mesh);
                scene.add(mesh);
                
                // Add edges for a more defined look
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
                mesh.add(line);
            });
        }

        function createParticles() {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            
            for (let i = 0; i < particleCount; i++) {
                positions.push(
                    (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 50,
                    (Math.random() - 0.5) * 50
                );
                
                colors.push(
                    Math.random(),
                    Math.random(),
                    Math.random()
                );
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8
            });
            
            const particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
            particles.push(particleSystem);
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            targetRotationX = mouseY * 0.5;
            targetRotationY = mouseX * 0.5;
            
            // Update mouse for raycaster
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onMouseClick(event) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects);
            
            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                // Animate the clicked object
                object.userData.targetScale = 1.5;
                
                // Add to score
                score += 10;
                document.getElementById('score-value').textContent = score;
                
                // Add color change animation
                const originalMaterials = object.material;
                if (Array.isArray(originalMaterials)) {
                    originalMaterials.forEach(mat => {
                        mat.emissive.setHex(0xffffff);
                        setTimeout(() => {
                            mat.emissive.setHex(0x000000);
                        }, 200);
                    });
                }
                
                // Create explosion effect
                createExplosion(object.position);
            }
        }

        function createExplosion(position) {
            const particleCount = 20;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            
            for (let i = 0; i < particleCount; i++) {
                positions.push(position.x, position.y, position.z);
                colors.push(Math.random(), Math.random(), Math.random());
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const material = new THREE.PointsMaterial({
                size: 0.3,
                vertexColors: true,
                transparent: true,
                opacity: 1
            });
            
            const explosion = new THREE.Points(geometry, material);
            scene.add(explosion);
            
            // Animate explosion
            let frame = 0;
            const animate = () => {
                frame++;
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < particleCount * 3; i += 3) {
                    pos[i] += (Math.random() - 0.5) * 0.5;
                    pos[i + 1] += (Math.random() - 0.5) * 0.5;
                    pos[i + 2] += (Math.random() - 0.5) * 0.5;
                }
                geometry.attributes.position.needsUpdate = true;
                material.opacity -= 0.05;
                
                if (frame < 20) {
                    requestAnimationFrame(animate);
                } else {
                    scene.remove(explosion);
                }
            };
            animate();
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.01;
            camera.position.z = Math.max(5, Math.min(30, camera.position.z));
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Smooth camera rotation based on mouse
            currentRotationX += (targetRotationX - currentRotationX) * 0.05;
            currentRotationY += (targetRotationY - currentRotationY) * 0.05;
            
            // Animate text meshes
            textMeshes.forEach((mesh, index) => {
                // Floating animation
                mesh.position.y = mesh.userData.originalY + Math.sin(time * mesh.userData.speed * 5 + mesh.userData.offset) * 0.5;
                
                // Rotation animation
                mesh.rotation.x = currentRotationX + Math.sin(time + mesh.userData.offset) * 0.1;
                mesh.rotation.y = currentRotationY + time * 0.5 + mesh.userData.offset;
                mesh.rotation.z = Math.sin(time * 0.5 + mesh.userData.offset) * 0.1;
                
                // Scale animation (for hover/click effect)
                mesh.userData.hoverScale += (mesh.userData.targetScale - mesh.userData.hoverScale) * 0.1;
                mesh.scale.set(mesh.userData.hoverScale, mesh.userData.hoverScale, mesh.userData.hoverScale);
                
                // Reset target scale
                if (Math.abs(mesh.userData.targetScale - 1) > 0.01) {
                    mesh.userData.targetScale += (1 - mesh.userData.targetScale) * 0.05;
                }
            });
            
            // Animate particles
            particles.forEach(particleSystem => {
                particleSystem.rotation.y += 0.001;
                particleSystem.rotation.x += 0.0005;
            });
            
            // Check for hover effects
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects);
            
            // Reset all hover states
            textMeshes.forEach(mesh => {
                if (mesh.userData.targetScale === 1) {
                    // No interaction
                }
            });
            
            // Apply hover effect
            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object.userData.targetScale === 1) {
                    object.userData.targetScale = 1.2;
                }
                document.body.style.cursor = 'pointer';
            } else {
                document.body.style.cursor = 'default';
            }
            
            renderer.render(scene, camera);
        }

        // Start the application
        init();
    </script>
</body>
</html>
